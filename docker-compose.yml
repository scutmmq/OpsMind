# OpsMind v2 — 运维数字员工系统
#
# 必须服务：opsmind-server, opsmind-web, postgres(pgvector), minio
# 可选服务：llama-cpp + llama-cpp-emb（profile: ai-local）
# 16GB 内存配置：模型 ~3.2GB，容器限额 ~7.5GB，余量充足
#
# 使用本地模型前，需先手动下载 GGUF 文件到 ./models/：
#   make model-download
#
# 启动：
#   docker compose up -d --build                    # 4 个必须服务
#   docker compose --profile ai-local up -d --build # 含 LLM + Embedding
#   docker compose down -v                          # 停止并清除数据

services:
  # Go 后端
  opsmind-server:
    build:
      context: ./server
    container_name: opsmind-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # 容器内地址覆写（.env 中是 localhost → 容器间 service name）
      OPSMIND_DATABASE_HOST: postgres
      OPSMIND_MINIO_ENDPOINT: minio:9000
      # 重排序（MiniLM-L-4-v2 ~80MB，需先 cd server && python models/rerank/download.py）
      OPSMIND_RERANK_ENABLED: "${OPSMIND_RERANK_ENABLED:-true}"
      OPSMIND_RERANK_PYTHON_PATH: python3
      OPSMIND_RERANK_SCRIPT_PATH: /app/rerank_server.py
      RERANK_MODEL: /app/models/rerank
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 384m
    networks:
      - opsmind

  # Next.js 前端
  opsmind-web:
    build:
      context: ./web
    container_name: opsmind-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      opsmind-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 128m
    networks:
      - opsmind

  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg18
    container_name: opsmind-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsmind}
      POSTGRES_USER: ${POSTGRES_USER:-opsmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsmind_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
    command: >
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_wal_size=1GB
      -c timezone=Asia/Shanghai
      -c log_timezone=Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsmind"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 512m
    networks:
      - opsmind

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: opsmind-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    networks:
      - opsmind

  # LLM 推理（Qwen3-4B Q4_K_M, ~2.5GB, CPU-only, ctx=8192）
  # 需先手动下载模型：make model-download
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: opsmind-llama-cpp
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ${LLAMA_MODELS_DIR:-./models}:/models:ro
    command:
      - "--model"
      - "/models/${OPSMIND_LLM_MODEL:-Qwen3-4B-Q4_K_M}.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8081"
      - "--n-gpu-layers"
      - "0"
      - "--ctx-size"
      - "8192"
      - "--flash-attn"
      - "on"
      - "--parallel"
      - "2"
    mem_limit: 4800m
    networks:
      - opsmind
    profiles:
      - ai-local

  # Embedding 向量化（Qwen3-Embedding-0.6B Q8_0, ~639MB, CPU-only）
  # 需先手动下载模型：make model-download
  llama-cpp-emb:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: opsmind-llama-cpp-emb
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - ${LLAMA_MODELS_DIR:-./models}:/models:ro
    command:
      - "--model"
      - "/models/${OPSMIND_EMBEDDING_MODEL:-Qwen3-Embedding-0.6B-Q8_0}.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8082"
      - "--n-gpu-layers"
      - "0"
      - "--ctx-size"
      - "4096"
      - "--embeddings"
      - "--parallel"
      - "2"
    mem_limit: 896m
    networks:
      - opsmind
    profiles:
      - ai-local

volumes:
  postgres_data:
  minio_data:

networks:
  opsmind:
    driver: bridge
